<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Inscription</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>📝 Inscription</h1>

  <p id="message"></p>

</div>

<script src="script.js"></script>
</body>
</html>
